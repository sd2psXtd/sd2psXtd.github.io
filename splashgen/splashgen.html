<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sd2psXtd Splash Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h2>sd2psXtd Splash Generator</h2>

  <input type="file" id="imgInput" accept="image/*" aria-label="Upload image" style="display:none;">

  <div class="controls">
    <div style="display:flex; flex-direction:column; gap:10px; width:100%; max-width:760px;">
      <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
        <span style="font-weight:600; color:#6cb6ff; min-width:90px;">Controls</span>
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="radio" name="uiMode" id="modeSimple" value="simple" checked>
          <span>Simple</span>
        </label>
        <label style="display:flex; align-items:center; gap:6px;">
          <input type="radio" name="uiMode" id="modeAdvanced" value="advanced">
          <span>Advanced</span>
        </label>
      </div>

      <div style="display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
        <span style="font-weight:600; color:#6cb6ff; min-width:120px;">Threshold</span>
        <input type="range" id="threshSlider" min="0" max="255" value="128" style="width: 220px;"
          title="Set the threshold for black/white conversion (0=black, 255=white)">
        <span id="threshVal" style="min-width:36px; color:#2d8cf0; font-weight:600;">128</span>
        <span id="effectiveThreshNote" style="font-size:0.9em; color:#a7b7ca;">(manual)</span>
      </div>

      <div id="advancedControls" style="display:none; flex-direction:column; gap:10px; border:1px solid #3a4252; border-radius:8px; padding:10px 12px; background:#1d2330;">
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <label for="thresholdMethod" style="font-weight:600; color:#6cb6ff;">Threshold Method</label>
          <select id="thresholdMethod" style="background:#232a36; color:#e3e6eb; border:1px solid #3a4252; border-radius:6px; padding:4px 8px;">
            <option value="manual" selected>Manual (Global)</option>
            <option value="otsu">Auto (Otsu Global)</option>
            <option value="adaptive">Adaptive (Local Mean)</option>
          </select>
          <label style="display:flex; align-items:center; gap:6px;">
            <input type="checkbox" id="invertToggle">
            <span>Invert Output</span>
          </label>
        </div>

        <div id="adaptiveControls" style="display:none; flex-direction:column; gap:8px;">
          <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <span style="font-weight:600; color:#6cb6ff; min-width:120px;">Local Window</span>
            <input type="range" id="adaptiveWindowSlider" min="3" max="31" step="2" value="15" style="width:170px;">
            <span id="adaptiveWindowVal" style="min-width:30px; color:#2d8cf0; font-weight:600;">15</span>
          </div>
          <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
            <span style="font-weight:600; color:#6cb6ff; min-width:120px;">Adaptive Bias</span>
            <input type="range" id="adaptiveBiasSlider" min="-64" max="64" step="1" value="0" style="width:170px;">
            <span id="adaptiveBiasVal" style="min-width:36px; color:#2d8cf0; font-weight:600;">0</span>
          </div>
        </div>

        <div style="font-weight:600; color:#6cb6ff;">Grayscale Weights</div>
        <div style="display:flex; align-items:center; gap:18px; flex-wrap:wrap;">
          <label title="Red channel weight (auto-normalized)">R
            <input type="range" id="rSlider" min="0" max="1" step="0.01" value="0.299"
              style="width: 100px; margin-left:6px;">
            <span id="rVal" style="min-width:36px; color:#ff6b6b; font-weight:600;">0.299</span>
          </label>
          <label title="Green channel weight (auto-normalized)">G
            <input type="range" id="gSlider" min="0" max="1" step="0.01" value="0.587"
              style="width: 100px; margin-left:6px;">
            <span id="gVal" style="min-width:36px; color:#51fa7b; font-weight:600;">0.587</span>
          </label>
          <label title="Blue channel weight (auto-normalized)">B
            <input type="range" id="bSlider" min="0" max="1" step="0.01" value="0.114"
              style="width: 100px; margin-left:6px;">
            <span id="bVal" style="min-width:36px; color:#6cb6ff; font-weight:600;">0.114</span>
          </label>
          <span style="font-size: 0.9em; color: #aaa; margin-left:10px;">(weights auto-normalized)</span>
        </div>
      </div>

      <div style="display:flex; justify-content:flex-end; margin-top:4px; gap:10px;">
        <button id="resetBtn"
          style="padding:5px 18px; border-radius:7px; background:#232a36; color:#e3e6eb; border:1.5px solid #3a4252; font-weight:600; cursor:pointer;">Reset</button>
        <button id="clearSelBtn"
          style="padding:5px 18px; border-radius:7px; background:#2d2a36; color:#ff6b6b; border:1.5px solid #6b2d2d; font-weight:600; cursor:pointer;">Clear
          Selection</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="img-block">
      <span>Original</span>
      <div id="origImgWrap" role="button" tabindex="0" aria-label="Drop image here or click to upload"
        style="position:relative; display:inline-block; width:305px; height:305px; min-width:305px; min-height:305px; max-width:305px; max-height:305px; border:2.5px dashed #bfc9d1; border-radius:10px; background:#f8fafc; transition:border-color 0.2s, background 0.2s; cursor:pointer;">
        <img id="origImg" src="" alt=""
          style="display:block; width:100%; height:100%; object-fit:contain; position:relative; z-index:1;" />
        <canvas id="selectCanvas"
          style="position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:none; z-index:2; background:transparent;"></canvas>
        <div id="dropOverlay"
          style="display:none; position:absolute; left:0; top:0; width:100%; height:100%; background:rgba(108,182,255,0.10); border-radius:10px; z-index:10; align-items:center; justify-content:center; color:#6cb6ff; font-size:1.2em; font-weight:600; pointer-events:none; text-align:center; transition:background 0.2s;">
          Drop image here</div>
      </div>

    </div>
    <div class="img-block">
      <span>Black & White</span>
      <canvas id="bwCanvas"></canvas>
      <div style="display:flex; flex-direction:row; gap:10px; margin-top:14px;">
        <button id="downloadBinBtn"
          style="font-size:1em; padding:7px 18px; border-radius:7px; background:#6cb6ff; color:#181c24; border:none; cursor:pointer; box-shadow:0 2px 8px 0 rgba(108,182,255,0.18);">Download
          Binary</button>
        <button id="downloadUf2Btn"
          style="font-size:1em; padding:7px 18px; border-radius:7px; background:#6cb6ff; color:#181c24; border:none; cursor:pointer; box-shadow:0 2px 8px 0 rgba(108,182,255,0.18);">Download
          UF2</button>
        <button id="downloadCombinedBtn"
          style="font-size:1em; padding:7px 18px; border-radius:7px; background:#6cb6ff; color:#181c24; border:none; cursor:pointer; box-shadow:0 2px 8px 0 rgba(108,182,255,0.18);">Download
          Combined UF2</button>
      </div>
      <div id="firmwareDropzone" style="margin-top:18px; padding:24px 18px; border:2px dashed #6cb6ff; border-radius:10px; background:#232a36; color:#6cb6ff; text-align:center; font-weight:600; cursor:pointer; transition:border-color 0.2s, background 0.2s;">Drop firmware UF2 here or click to select</div>

    </div>
  </div>
  <div style="max-width:900px; margin: 28px auto 0 auto; width: 98vw;">
    <label for="cArrayBox" style="font-weight:600; color:#6cb6ff; margin-bottom:6px; display:block;">C Header
      Array:</label>
    <textarea id="cArrayBox" readonly aria-label="C header array"
      style="width:100%; min-width:220px; max-width:100%; height:160px; font-family:monospace; font-size:0.98em; background:#232a36; color:#e3e6eb; border-radius:7px; border:1.5px solid #3a4252; padding:8px; resize:vertical; display:block;"></textarea>
  </div>

  <script src="uf2.js"></script>
  <script defer>

    // --- DOM Queries ---
    const origImgWrap = document.getElementById('origImgWrap');
    const dropOverlay = document.getElementById('dropOverlay');
    const imgInput = document.getElementById('imgInput');
    const origImg = document.getElementById('origImg');

    const bwCanvas = document.getElementById('bwCanvas');
    const bwCtx = bwCanvas.getContext('2d');
    const modeSimple = document.getElementById('modeSimple');
    const modeAdvanced = document.getElementById('modeAdvanced');
    const advancedControls = document.getElementById('advancedControls');
    const threshSlider = document.getElementById('threshSlider');
    const threshVal = document.getElementById('threshVal');
    const effectiveThreshNote = document.getElementById('effectiveThreshNote');
    const thresholdMethod = document.getElementById('thresholdMethod');
    const adaptiveControls = document.getElementById('adaptiveControls');
    const adaptiveWindowSlider = document.getElementById('adaptiveWindowSlider');
    const adaptiveWindowVal = document.getElementById('adaptiveWindowVal');
    const adaptiveBiasSlider = document.getElementById('adaptiveBiasSlider');
    const adaptiveBiasVal = document.getElementById('adaptiveBiasVal');
    const invertToggle = document.getElementById('invertToggle');
    const rSlider = document.getElementById('rSlider');
    const gSlider = document.getElementById('gSlider');
    const bSlider = document.getElementById('bSlider');
    const rVal = document.getElementById('rVal');
    const gVal = document.getElementById('gVal');
    const bVal = document.getElementById('bVal');
    const cArrayBox = document.getElementById('cArrayBox');

    // --- Drag and drop image loading for origImgWrap ---
    origImgWrap.addEventListener('dragover', function (e) {
      e.preventDefault();
      dropOverlay.style.display = 'flex';
      origImgWrap.style.borderColor = '#2d8cf0';
      origImgWrap.style.background = '#e3ecfa';
    });
    origImgWrap.addEventListener('dragleave', function (e) {
      dropOverlay.style.display = 'none';
      origImgWrap.style.borderColor = '';
      origImgWrap.style.background = '';
    });
    origImgWrap.addEventListener('drop', function (e) {
      e.preventDefault();
      dropOverlay.style.display = 'none';
      origImgWrap.style.borderColor = '';
      origImgWrap.style.background = '';
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        const file = e.dataTransfer.files[0];
        if (!file.type.startsWith('image/')) {
          alert('Please drop an image file.');
          return;
        }
        const reader = new FileReader();
        reader.onload = function (ev) {
          origImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // Mouse/touch accessibility: click to upload before an image is loaded
    origImgWrap.addEventListener('click', function () {
      if (!imgLoaded) {
        imgInput.click();
      }
    });

    // Keyboard accessibility: allow Enter/Space to trigger file input
    origImgWrap.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        imgInput.click();
      }
    });


    function getActiveThresholdMode() {
      if (!modeAdvanced.checked) {
        return 'manual';
      }
      return thresholdMethod.value;
    }

    function updateConversionModeUI() {
      const advancedEnabled = modeAdvanced.checked;
      advancedControls.style.display = advancedEnabled ? 'flex' : 'none';
      const activeMode = getActiveThresholdMode();
      adaptiveControls.style.display = (advancedEnabled && activeMode === 'adaptive') ? 'flex' : 'none';

      const manualMode = activeMode === 'manual';
      threshSlider.disabled = !manualMode;
      threshSlider.style.opacity = manualMode ? '1' : '0.55';

      if (activeMode === 'manual') {
        effectiveThreshNote.textContent = '(manual)';
      } else if (activeMode === 'otsu') {
        effectiveThreshNote.textContent = '(auto: Otsu)';
      } else {
        effectiveThreshNote.textContent = '(auto: adaptive)';
      }
    }

    // Reset controls to default values
    document.getElementById('resetBtn').addEventListener('click', function () {
      modeSimple.checked = true;
      threshSlider.value = 128;
      thresholdMethod.value = 'manual';
      adaptiveWindowSlider.value = 15;
      adaptiveBiasSlider.value = 0;
      invertToggle.checked = false;
      rSlider.value = 0.299;
      gSlider.value = 0.587;
      bSlider.value = 0.114;
      updateConversionModeUI();
      updateLabels();
      updateBW();
    });


    // --- Binary and C array export helpers ---
    function getBWBinaryArray() {
      const outW = 128, outH = 64;
      const ctx = bwCanvas.getContext('2d');
      const imgData = ctx.getImageData(0, 0, outW, outH);
      const data = imgData.data;
      const numBytes = (outW * outH) / 8;
      const bin = new Uint8Array(numBytes);
      let byte = 0, bit = 0, idx = 0;
      for (let y = 0; y < outH; ++y) {
        for (let x = 0; x < outW; ++x) {
          const i = (y * outW + x) * 4;
          const v = data[i];
          if (v > 127) byte |= (1 << (7 - bit));
          bit++;
          if (bit === 8) {
            bin[idx++] = byte;
            byte = 0;
            bit = 0;
          }
        }
      }
      return bin;
    }

    // Use the same color table for both binary and C array
    const COLOR_TABLE = [0x00, 0x00, 0x00, 0xFF, 0xFF, 0xFF, 0xFF, 0xFF];

    function bwBinaryToCArray(bin, arrName = "bw_image") {
      let out = `const uint8_t ${arrName}[${bin.length + COLOR_TABLE.length}] = {\n  `;
      let col = 0;
      for (let i = 0; i < COLOR_TABLE.length; ++i, ++col) {
        out += `0x${COLOR_TABLE[i].toString(16).padStart(2, '0')}`;
        if (i !== bin.length + COLOR_TABLE.length - 1) out += ',';
        if ((col + 1) % 8 === 0 && i !== bin.length + COLOR_TABLE.length - 1) { out += '\n  '; col = -1; }
        else if (i !== bin.length + COLOR_TABLE.length - 1) out += ' ';
      }
      for (let i = 0; i < bin.length; ++i, ++col) {
        out += `0x${bin[i].toString(16).padStart(2, '0')}`;
        if (i !== bin.length - 1) out += ',';
        if ((col + 1) % 8 === 0 && i !== bin.length - 1) { out += '\n  '; col = -1; }
        else if (i !== bin.length - 1) out += ' ';
      }
      out += '\n};';
      return out;
    }

    function updateCArrayBox() {
      const bin = getBWBinaryArray();
      document.getElementById('cArrayBox').value = bwBinaryToCArray(bin);
    }

    function downloadBWBinary() {
      // Use the same color table as C array
      const colorTable = new Uint8Array(COLOR_TABLE);
      const bin = getBWBinaryArray();
      const full = new Uint8Array(colorTable.length + bin.length);
      full.set(colorTable, 0);
      full.set(bin, colorTable.length);
      const blob = new Blob([full], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'bw_image.bin';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
    }

    // Attach download handler
    document.getElementById('downloadBinBtn').addEventListener('click', downloadBWBinary);
    // Auto-select C array textarea on click
    document.getElementById('cArrayBox').addEventListener('click', function (e) {
      this.select();
    });


    const selectCanvas = document.getElementById('selectCanvas');
    const selectCtx = selectCanvas.getContext('2d');

    let isSelecting = false;
    let selectStart = null;
    let selection = null; // {x, y, w, h}
    let isDraggingSelection = false;
    let dragOffset = { x: 0, y: 0 };

    let imgLoaded = false;

    function getDisplayImageRect() {
      const boxW = selectCanvas.width || origImg.clientWidth || origImg.offsetWidth || 1;
      const boxH = selectCanvas.height || origImg.clientHeight || origImg.offsetHeight || 1;
      const naturalW = origImg.naturalWidth;
      const naturalH = origImg.naturalHeight;

      if (!naturalW || !naturalH) {
        return { x: 0, y: 0, w: boxW, h: boxH };
      }

      const imageAspect = naturalW / naturalH;
      const boxAspect = boxW / boxH;
      let drawW;
      let drawH;
      let drawX;
      let drawY;

      if (imageAspect > boxAspect) {
        drawW = boxW;
        drawH = boxW / imageAspect;
        drawX = 0;
        drawY = (boxH - drawH) / 2;
      } else {
        drawH = boxH;
        drawW = boxH * imageAspect;
        drawX = (boxW - drawW) / 2;
        drawY = 0;
      }

      return { x: drawX, y: drawY, w: drawW, h: drawH };
    }

    function clampPointToRect(x, y, rect) {
      return {
        x: Math.max(rect.x, Math.min(x, rect.x + rect.w)),
        y: Math.max(rect.y, Math.min(y, rect.y + rect.h))
      };
    }

    function pointInRect(x, y, rect) {
      return (
        x >= rect.x &&
        x <= rect.x + rect.w &&
        y >= rect.y &&
        y <= rect.y + rect.h
      );
    }

    function remapSelectionToNewRect(oldRect, newRect) {
      if (!selection || oldRect.w <= 0 || oldRect.h <= 0 || newRect.w <= 0 || newRect.h <= 0) {
        return;
      }

      const oldX0 = (selection.x - oldRect.x) / oldRect.w;
      const oldY0 = (selection.y - oldRect.y) / oldRect.h;
      const oldX1 = (selection.x + selection.w - oldRect.x) / oldRect.w;
      const oldY1 = (selection.y + selection.h - oldRect.y) / oldRect.h;

      const x0 = Math.max(0, Math.min(1, Math.min(oldX0, oldX1)));
      const y0 = Math.max(0, Math.min(1, Math.min(oldY0, oldY1)));
      const x1 = Math.max(0, Math.min(1, Math.max(oldX0, oldX1)));
      const y1 = Math.max(0, Math.min(1, Math.max(oldY0, oldY1)));

      selection = {
        x: newRect.x + x0 * newRect.w,
        y: newRect.y + y0 * newRect.h,
        w: (x1 - x0) * newRect.w,
        h: (y1 - y0) * newRect.h
      };

      if (selection.w < 1 || selection.h < 1) {
        selection = null;
      }
    }

    function computeOtsuThreshold(grayValues) {
      const histogram = new Uint32Array(256);
      for (let i = 0; i < grayValues.length; ++i) {
        histogram[grayValues[i]]++;
      }

      const total = grayValues.length;
      let sum = 0;
      for (let i = 0; i < 256; ++i) {
        sum += i * histogram[i];
      }

      let sumBackground = 0;
      let weightBackground = 0;
      let bestVariance = -1;
      let bestThreshold = 128;

      for (let t = 0; t < 256; ++t) {
        weightBackground += histogram[t];
        if (weightBackground === 0) continue;

        const weightForeground = total - weightBackground;
        if (weightForeground === 0) break;

        sumBackground += t * histogram[t];
        const meanBackground = sumBackground / weightBackground;
        const meanForeground = (sum - sumBackground) / weightForeground;
        const betweenClassVariance = weightBackground * weightForeground * (meanBackground - meanForeground) * (meanBackground - meanForeground);

        if (betweenClassVariance > bestVariance) {
          bestVariance = betweenClassVariance;
          bestThreshold = t;
        }
      }

      return bestThreshold;
    }

    function computeAdaptiveBinary(grayValues, width, height, windowSize, bias) {
      const binary = new Uint8Array(grayValues.length);
      const stride = width + 1;
      const integral = new Float64Array((height + 1) * stride);

      for (let y = 1; y <= height; ++y) {
        let rowSum = 0;
        for (let x = 1; x <= width; ++x) {
          rowSum += grayValues[(y - 1) * width + (x - 1)];
          integral[y * stride + x] = integral[(y - 1) * stride + x] + rowSum;
        }
      }

      const radius = Math.floor(windowSize / 2);
      for (let y = 0; y < height; ++y) {
        const y0 = Math.max(0, y - radius);
        const y1 = Math.min(height - 1, y + radius);
        for (let x = 0; x < width; ++x) {
          const x0 = Math.max(0, x - radius);
          const x1 = Math.min(width - 1, x + radius);
          const idx = y * width + x;

          const iA = y0 * stride + x0;
          const iB = y0 * stride + (x1 + 1);
          const iC = (y1 + 1) * stride + x0;
          const iD = (y1 + 1) * stride + (x1 + 1);

          const sum = integral[iD] - integral[iB] - integral[iC] + integral[iA];
          const count = (x1 - x0 + 1) * (y1 - y0 + 1);
          const localThreshold = (sum / count) + bias;
          binary[idx] = grayValues[idx] >= localThreshold ? 255 : 0;
        }
      }

      return binary;
    }

    function binarizeGrayscale(grayValues, width, height) {
      const mode = getActiveThresholdMode();
      const invert = modeAdvanced.checked && invertToggle.checked;
      let binary;

      if (mode === 'adaptive') {
        let windowSize = parseInt(adaptiveWindowSlider.value, 10);
        if (windowSize % 2 === 0) {
          windowSize += 1;
        }
        const bias = parseInt(adaptiveBiasSlider.value, 10);
        binary = computeAdaptiveBinary(grayValues, width, height, windowSize, bias);
        effectiveThreshNote.textContent = `(adaptive: w${windowSize}, b${bias})`;
      } else {
        const threshold = mode === 'otsu' ? computeOtsuThreshold(grayValues) : parseInt(threshSlider.value, 10);
        binary = new Uint8Array(grayValues.length);
        for (let i = 0; i < grayValues.length; ++i) {
          binary[i] = grayValues[i] >= threshold ? 255 : 0;
        }
        if (mode === 'otsu') {
          effectiveThreshNote.textContent = `(auto: Otsu=${threshold})`;
        } else {
          effectiveThreshNote.textContent = `(manual: ${threshold})`;
        }
      }

      if (invert) {
        for (let i = 0; i < binary.length; ++i) {
          binary[i] = 255 - binary[i];
        }
      }

      return binary;
    }



    // --- Main BW update logic ---
    function updateBW() {
      if (!imgLoaded) return;
      // Use the selected region if present, else full image
      const origW = origImg.naturalWidth;
      const origH = origImg.naturalHeight;
      let crop = { x: 0, y: 0, w: origW, h: origH };
      if (selection && selectCanvas.width && selectCanvas.height) {
        const imageRect = getDisplayImageRect();
        const selX0 = Math.max(imageRect.x, selection.x);
        const selY0 = Math.max(imageRect.y, selection.y);
        const selX1 = Math.min(imageRect.x + imageRect.w, selection.x + selection.w);
        const selY1 = Math.min(imageRect.y + imageRect.h, selection.y + selection.h);
        if (selX1 - selX0 >= 2 && selY1 - selY0 >= 2) {
          const scaleX = origW / imageRect.w;
          const scaleY = origH / imageRect.h;
          crop = {
            x: Math.max(0, Math.floor((selX0 - imageRect.x) * scaleX)),
            y: Math.max(0, Math.floor((selY0 - imageRect.y) * scaleY)),
            w: Math.max(1, Math.ceil((selX1 - selX0) * scaleX)),
            h: Math.max(1, Math.ceil((selY1 - selY0) * scaleY))
          };
          // Clamp
          if (crop.x + crop.w > origW) crop.w = origW - crop.x;
          if (crop.y + crop.h > origH) crop.h = origH - crop.y;
          // If selection is too small, fallback to full image
          if (crop.w < 2 || crop.h < 2) {
            crop = { x: 0, y: 0, w: origW, h: origH };
          }
        }
      }
      // Determine target size based on crop
      let targetW, targetH;
      if (crop.w / crop.h >= 128 / 64) {
        targetW = 128;
        targetH = Math.round(crop.h * (128 / crop.w));
        if (targetH > 64) {
          targetH = 64;
          targetW = Math.round(crop.w * (64 / crop.h));
        }
      } else {
        targetH = 64;
        targetW = Math.round(crop.w * (64 / crop.h));
        if (targetW > 128) {
          targetW = 128;
          targetH = Math.round(crop.h * (128 / crop.w));
        }
      }
      // Always output 128x64
      const outW = 128, outH = 64;
      // Calculate scaled image size
      let drawW = targetW, drawH = targetH;
      // Center the image
      let offsetX = Math.floor((outW - drawW) / 2);
      let offsetY = Math.floor((outH - drawH) / 2);
      // Create a temp canvas for the scaled image
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = drawW;
      tempCanvas.height = drawH;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.clearRect(0, 0, drawW, drawH);
      tempCtx.drawImage(origImg, crop.x, crop.y, crop.w, crop.h, 0, 0, drawW, drawH);
      // Get image data from temp
      const imgData = tempCtx.getImageData(0, 0, drawW, drawH);
      const data = imgData.data;

      // Normalize grayscale weights
      let rW = 0.299;
      let gW = 0.587;
      let bW = 0.114;
      if (modeAdvanced.checked) {
        rW = parseFloat(rSlider.value);
        gW = parseFloat(gSlider.value);
        bW = parseFloat(bSlider.value);
        const sum = rW + gW + bW;
        if (sum > 0) {
          rW /= sum;
          gW /= sum;
          bW /= sum;
        } else {
          rW = 0.299;
          gW = 0.587;
          bW = 0.114;
        }
      }

      // Convert to grayscale, then apply the selected threshold strategy.
      const grayValues = new Uint8Array(drawW * drawH);
      for (let p = 0, i = 0; p < grayValues.length; ++p, i += 4) {
        const avg = rW * data[i] + gW * data[i + 1] + bW * data[i + 2];
        grayValues[p] = Math.max(0, Math.min(255, Math.round(avg)));
      }

      const binaryValues = binarizeGrayscale(grayValues, drawW, drawH);
      for (let i = 0; i < data.length; i += 4) {
        const bw = binaryValues[i / 4];
        data[i] = data[i + 1] = data[i + 2] = bw;
        data[i + 3] = 255;
      }
      tempCtx.putImageData(imgData, 0, 0);


      // Prepare output canvas
      bwCanvas.width = outW;
      bwCanvas.height = outH;

      // Use putImageData for performance
      // Create a blank image buffer
      const bwImgData = bwCtx.createImageData(outW, outH);
      const bwData = bwImgData.data;
      // Fill with black
      for (let i = 0; i < bwData.length; i += 4) {
        bwData[i] = 0;
        bwData[i + 1] = 0;
        bwData[i + 2] = 0;
        bwData[i + 3] = 255;
      }
      // Copy processed image into center
      const tempBW = tempCtx.getImageData(0, 0, drawW, drawH).data;
      for (let y = 0; y < drawH; ++y) {
        for (let x = 0; x < drawW; ++x) {
          const srcIdx = (y * drawW + x) * 4;
          const dstIdx = ((y + offsetY) * outW + (x + offsetX)) * 4;
          bwData[dstIdx] = tempBW[srcIdx];
          bwData[dstIdx + 1] = tempBW[srcIdx + 1];
          bwData[dstIdx + 2] = tempBW[srcIdx + 2];
          bwData[dstIdx + 3] = 255;
        }
      }
      bwCtx.putImageData(bwImgData, 0, 0);

      // Only update C array box once, after all drawing is done
      updateCArrayBox();

      // Upscale the canvas to match the original image's display size
      const displayW = origImg.clientWidth;
      const displayH = origImg.clientHeight;
      //if (displayW && displayH) {
      //  bwCanvas.style.width = '128px';
      //  bwCanvas.style.height = '64px';
      //} else {
        bwCanvas.style.width = '300px';
        bwCanvas.style.height = 'auto';
      //}
    }


    imgInput.addEventListener('change', function (e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function (ev) {
        origImg.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // Error handling for image load
    origImg.onerror = function () {
      imgLoaded = false;
      isSelecting = false;
      isDraggingSelection = false;
      selection = null;
      selectCanvas.style.pointerEvents = 'none';
      drawSelection();
      alert('Failed to load image. Please try another file.');
    };

    origImg.onload = function () {

      isSelecting = false;
      isDraggingSelection = false;
      selection = null;
      imgLoaded = true;
      // Sync overlay size to image
      function syncOverlay() {
        const w = origImg.offsetWidth;
        const h = origImg.offsetHeight;
        if (w && h) {
          selectCanvas.width = w;
          selectCanvas.height = h;
          selectCanvas.style.width = w + 'px';
          selectCanvas.style.height = h + 'px';
          selectCanvas.style.display = '';
          selectCanvas.style.pointerEvents = 'auto';
          drawSelection();
          updateBW();
        } else {
          requestAnimationFrame(syncOverlay);
        }
      }
      syncOverlay();
    };
    // Clear selection button logic
    document.getElementById('clearSelBtn').addEventListener('click', function () {
      selection = null;
      drawSelection();
      updateBW();
    });

    function drawSelection() {
      selectCtx.clearRect(0, 0, selectCanvas.width, selectCanvas.height);
      if (selection) {
        selectCtx.save();
        // Only draw border
        selectCtx.strokeStyle = '#2d8cf0';
        selectCtx.lineWidth = 2;
        selectCtx.setLineDash([6, 4]);
        selectCtx.strokeRect(selection.x + 0.5, selection.y + 0.5, selection.w, selection.h);
        selectCtx.restore();
      }
    }
    function updateLabels() {
      threshVal.textContent = threshSlider.value;
      adaptiveWindowVal.textContent = adaptiveWindowSlider.value;
      adaptiveBiasVal.textContent = adaptiveBiasSlider.value;
      rVal.textContent = parseFloat(rSlider.value).toFixed(3);
      gVal.textContent = parseFloat(gSlider.value).toFixed(3);
      bVal.textContent = parseFloat(bSlider.value).toFixed(3);
    }
    // --- Selection overlay logic ---

    selectCanvas.addEventListener('mousedown', function (e) {
      if (!imgLoaded) return;
      const rect = selectCanvas.getBoundingClientRect();
      const mouseX = Math.max(0, Math.min(e.clientX - rect.left, selectCanvas.width));
      const mouseY = Math.max(0, Math.min(e.clientY - rect.top, selectCanvas.height));
      const imageRect = getDisplayImageRect();
      // If inside selection, start dragging
      if (selection &&
        mouseX >= selection.x && mouseX <= selection.x + selection.w &&
        mouseY >= selection.y && mouseY <= selection.y + selection.h) {
        isDraggingSelection = true;
        dragOffset.x = mouseX - selection.x;
        dragOffset.y = mouseY - selection.y;
      } else if (pointInRect(mouseX, mouseY, imageRect)) {
        const clampedStart = clampPointToRect(mouseX, mouseY, imageRect);
        isSelecting = true;
        selectStart = {
          x: clampedStart.x,
          y: clampedStart.y
        };
        selection = null;
        drawSelection();
      } else {
        isSelecting = false;
        selectStart = null;
      }
    });

    selectCanvas.addEventListener('mousemove', function (e) {
      if (!imgLoaded || (!isDraggingSelection && !isSelecting)) return;
      const rect = selectCanvas.getBoundingClientRect();
      const imageRect = getDisplayImageRect();
      const rawX = Math.max(0, Math.min(e.clientX - rect.left, selectCanvas.width));
      const rawY = Math.max(0, Math.min(e.clientY - rect.top, selectCanvas.height));
      const clampedPoint = clampPointToRect(rawX, rawY, imageRect);
      if (isDraggingSelection && selection) {
        // Move selection
        let newX = clampedPoint.x - dragOffset.x;
        let newY = clampedPoint.y - dragOffset.y;
        // Clamp to visible image area
        const maxX = imageRect.x + Math.max(0, imageRect.w - selection.w);
        const maxY = imageRect.y + Math.max(0, imageRect.h - selection.h);
        newX = Math.max(imageRect.x, Math.min(newX, maxX));
        newY = Math.max(imageRect.y, Math.min(newY, maxY));
        selection.x = newX;
        selection.y = newY;
        drawSelection();
      } else if (isSelecting && selectStart) {
        const sx = selectStart.x;
        const sy = selectStart.y;
        selection = {
          x: Math.min(sx, clampedPoint.x),
          y: Math.min(sy, clampedPoint.y),
          w: Math.abs(clampedPoint.x - sx),
          h: Math.abs(clampedPoint.y - sy)
        };
        drawSelection();
      }
    });

    window.addEventListener('mouseup', function (e) {
      if (isSelecting) {
        isSelecting = false;
        if (selection && (selection.w < 5 || selection.h < 5)) {
          // Too small, clear
          selection = null;
        }
        drawSelection();
        updateBW();
      }
      if (isDraggingSelection) {
        isDraggingSelection = false;
        drawSelection();
        updateBW();
      }
    });


    window.addEventListener('resize', function () {
      if (!imgLoaded) return;
      function syncOverlayResize() {
        const w = origImg.offsetWidth;
        const h = origImg.offsetHeight;
        if (w && h) {
          const oldRect = getDisplayImageRect();
          selectCanvas.width = w;
          selectCanvas.height = h;
          selectCanvas.style.width = w + 'px';
          selectCanvas.style.height = h + 'px';
          selectCanvas.style.pointerEvents = 'auto';
          const newRect = getDisplayImageRect();
          remapSelectionToNewRect(oldRect, newRect);
          drawSelection();
          updateBW();
        } else {
          requestAnimationFrame(syncOverlayResize);
        }
      }
      syncOverlayResize();
    });
    // (Selection overlay removed)


    modeSimple.addEventListener('change', function () {
      if (modeSimple.checked) {
        updateConversionModeUI();
        updateLabels();
        updateBW();
      }
    });
    modeAdvanced.addEventListener('change', function () {
      if (modeAdvanced.checked) {
        updateConversionModeUI();
        updateLabels();
        updateBW();
      }
    });
    thresholdMethod.addEventListener('change', function () {
      updateConversionModeUI();
      updateLabels();
      updateBW();
    });
    invertToggle.addEventListener('change', function () {
      updateBW();
    });
    adaptiveWindowSlider.addEventListener('input', function () {
      adaptiveWindowVal.textContent = adaptiveWindowSlider.value;
      updateBW();
    });
    adaptiveBiasSlider.addEventListener('input', function () {
      adaptiveBiasVal.textContent = adaptiveBiasSlider.value;
      updateBW();
    });
    adaptiveWindowSlider.addEventListener('change', function () {
      updateLabels();
      updateBW();
    });
    adaptiveBiasSlider.addEventListener('change', function () {
      updateLabels();
      updateBW();
    });

    // Update labels live as the slider moves
    threshSlider.addEventListener('input', function () {
      threshVal.textContent = threshSlider.value;
      updateBW();
    });
    rSlider.addEventListener('input', function () {
      rVal.textContent = parseFloat(rSlider.value).toFixed(3);
      updateBW();
    });
    gSlider.addEventListener('input', function () {
      gVal.textContent = parseFloat(gSlider.value).toFixed(3);
      updateBW();
    });
    bSlider.addEventListener('input', function () {
      bVal.textContent = parseFloat(bSlider.value).toFixed(3);
      updateBW();
    });

    // Only update BW image when the user releases the slider
    threshSlider.addEventListener('change', function () {
      updateLabels();
      updateBW();
    });
    rSlider.addEventListener('change', function () {
      updateLabels();
      updateBW();
    });
    gSlider.addEventListener('change', function () {
      updateLabels();
      updateBW();
    });
    bSlider.addEventListener('change', function () {
      updateLabels();
      updateBW();
    });

    updateConversionModeUI();
    updateLabels();

    // Download UF2 handler
    let logoUf2 = null;
    document.getElementById('downloadUf2Btn').addEventListener('click', function () {
      const colorTable = new Uint8Array(COLOR_TABLE);
      const bin = getBWBinaryArray();
      const full = new Uint8Array(colorTable.length + bin.length);
      full.set(colorTable, 0);
      full.set(bin, colorTable.length);
      logoUf2 = payloadToUf2(full.buffer);
      const blob = new Blob([logoUf2], { type: 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'logo.uf2';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 100);
    });

    // Firmware UF2 upload and combine logic
    let uploadedFirmwareUf2 = null;
    const firmwareDropzone = document.getElementById('firmwareDropzone');
    const firmwareDropzoneDefaultText = 'Drop firmware UF2 here or click to select';

    function setUploadedFirmwareUf2(file, arrayBuffer) {
      const validation = validateUf2ArrayBuffer(arrayBuffer);
      if (!validation.valid) {
        throw new Error(validation.error);
      }
      uploadedFirmwareUf2 = validation.buffer;
      firmwareDropzone.textContent = 'Firmware UF2 uploaded: ' + file.name;
    }

    function loadFirmwareUf2File(file) {
      if (!file) return;
      if (!file.name.toLowerCase().endsWith('.uf2')) {
        alert('Please select a UF2 firmware file.');
        return;
      }
      const reader = new FileReader();
      reader.onload = function (ev) {
        try {
          setUploadedFirmwareUf2(file, ev.target.result);
        } catch (err) {
          uploadedFirmwareUf2 = null;
          firmwareDropzone.textContent = firmwareDropzoneDefaultText;
          alert('Invalid UF2 file: ' + err.message);
        }
      };
      reader.onerror = function () {
        uploadedFirmwareUf2 = null;
        firmwareDropzone.textContent = firmwareDropzoneDefaultText;
        alert('Failed to read UF2 file.');
      };
      reader.readAsArrayBuffer(file);
    }

    firmwareDropzone.addEventListener('dragover', function(e) {
      e.preventDefault();
      firmwareDropzone.style.borderColor = '#2d8cf0';
      firmwareDropzone.style.background = '#2d3a56';
    });
    firmwareDropzone.addEventListener('dragleave', function(e) {
      firmwareDropzone.style.borderColor = '#6cb6ff';
      firmwareDropzone.style.background = '#232a36';
    });
    firmwareDropzone.addEventListener('drop', function(e) {
      e.preventDefault();
      firmwareDropzone.style.borderColor = '#6cb6ff';
      firmwareDropzone.style.background = '#232a36';
      if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
        loadFirmwareUf2File(e.dataTransfer.files[0]);
      }
    });
    // Optional: click to select file
    firmwareDropzone.addEventListener('click', function() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.uf2';
      input.style.display = 'none';
      input.onchange = function(e) {
        const file = e.target.files[0];
        loadFirmwareUf2File(file);
      };
      input.click();
    });

    document.getElementById('downloadCombinedBtn').addEventListener('click', function() {
      if (!uploadedFirmwareUf2) {
        alert('Please upload a firmware UF2 file first.');
        return;
      }
      const colorTable = new Uint8Array(COLOR_TABLE);
      const bin = getBWBinaryArray();
      const full = new Uint8Array(colorTable.length + bin.length);
      full.set(colorTable, 0);
      full.set(bin, colorTable.length);
      const logoUf2 = payloadToUf2(full.buffer);

      try {
        // Merge using uf2.js
        const merged = mergeUf2Files(uploadedFirmwareUf2, logoUf2.buffer);
        const blob = new Blob([merged], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'combined.uf2';
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 100);
      } catch (err) {
        alert('Failed to merge UF2 files: ' + err.message);
      }
    });

  </script>
